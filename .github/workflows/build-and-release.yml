# ============================================================
# 固件 + 桌面客户端 手动构建与发布
# ============================================================
# 手动触发，从私有仓库拉取指定 tag 的源码，矩阵编译固件和
# 桌面客户端，在当前公开仓库创建 Release 并上传产物。
# 公开仓库不限量免费使用 macOS / Windows / Linux runner。
# ============================================================

name: Build and Release Firmware + Desktop

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 私有仓库需要编译的 Tag（例如 V1.0.6）
        required: true
        default: V1.0.6

concurrency:
  group: manual-build-${{ github.event.inputs.tag_name }}
  cancel-in-progress: true

jobs:
  # ── 固件构建（ESP-IDF 容器） ──
  build-firmware:
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0.1
    steps:
      - name: 拉取私有仓库源码
        uses: actions/checkout@v4
        with:
          repository: loommii/esp32-usb-hid-device
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.inputs.tag_name }}

      - name: 编译并合并为单文件固件
        run: |
          . /opt/esp/idf/export.sh
          idf.py set-target esp32s3
          mkdir -p "$(pwd)/firmware"
          idf.py merge-bin -o "$(pwd)/firmware/esp32-usb-hid-stabilizer.bin" -f raw

      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: firmware/esp32-usb-hid-stabilizer.bin

  # ── 桌面客户端构建（Tauri，3 平台 4 架构并行） ──
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: ''
            label: Windows-x64
          - platform: ubuntu-22.04
            target: ''
            label: Linux-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: 拉取私有仓库源码
        uses: actions/checkout@v4
        with:
          repository: loommii/esp32-usb-hid-device
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.inputs.tag_name }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: 安装前端依赖
        working-directory: desktop
        run: npm ci

      # prost-build 编译 .proto 文件需要 protoc
      - name: 安装 protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: 安装 protoc + 系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 安装 protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: 安装 Rust 交叉编译目标
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: 构建 Tauri 客户端
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: 上传客户端产物
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            desktop/src-tauri/target/${{ matrix.target || '**' }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.target || '**' }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.target || '**' }}/release/bundle/**/*.msi
            desktop/src-tauri/target/${{ matrix.target || '**' }}/release/bundle/**/*.deb
            desktop/src-tauri/target/${{ matrix.target || '**' }}/release/bundle/**/*.AppImage
          if-no-files-found: error

  # ── 发布：在当前仓库创建 Release ──
  release:
    runs-on: ubuntu-latest
    needs: [build-firmware, build-desktop]
    permissions:
      contents: write
    steps:
      - name: 拉取仓库元数据（供 gh CLI 创建 Release）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出所有产物
        run: find artifacts -type f | sort

      - name: 在当前仓库创建 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag_name }}"
          echo "Creating release ${TAG}..."

          gh release delete "${TAG}" --yes 2>/dev/null || true
          gh release create "${TAG}" \
            --title "HID Stabilizer Manager ${TAG}" \
            --notes "Release ${TAG} for ESP32-S3 USB HID Stabilizer"

      - name: 上传固件到 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag_name }}"

          BIN="$(find artifacts -name 'esp32-usb-hid-stabilizer.bin' -type f | head -1)"
          if [ -n "${BIN}" ]; then
            DIR="$(dirname "${BIN}")"
            RENAMED="${DIR}/esp32-usb-hid-stabilizer-${TAG}.bin"
            mv "${BIN}" "${RENAMED}"
            echo "Uploading firmware: ${RENAMED}"
            gh release upload "${TAG}" "${RENAMED}" --clobber
          else
            echo "No firmware binary found, skipping..."
          fi

      - name: 重命名并上传桌面客户端到 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag_name }}"
          BASE="HID-Stabilizer-Manager-${TAG}"

          map_platform() {
            case "$1" in
              desktop-macOS-aarch64) echo "macOS-aarch64" ;;
              desktop-macOS-x64)     echo "macOS-x86_64" ;;
              desktop-Windows-x64)   echo "Windows-x86_64" ;;
              desktop-Linux-x64)     echo "Linux-x86_64" ;;
              *)                     echo "$1" ;;
            esac
          }

          find artifacts -type d -name 'desktop-*' | while read -r dir; do
            NAME="$(basename "${dir}")"
            PLATFORM="$(map_platform "${NAME}")"

            find "${dir}" -type f \( \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.deb' -o \
              -name '*.AppImage' \
            \) | while read -r f; do
              EXT="${f##*.}"
              # Handle .tar.gz / .tar.xz etc
              case "${f}" in
                *.tar.gz) EXT="tar.gz" ;;
                *.tar.xz) EXT="tar.xz" ;;
              esac
              NEW_NAME="${BASE}-${PLATFORM}.${EXT}"
              mv "${f}" "$(dirname "${f}")/${NEW_NAME}"
              echo "Uploading: ${NEW_NAME}"
              gh release upload "${TAG}" "$(dirname "${f}")/${NEW_NAME}" --clobber
            done
          done

      - name: 输出下载地址
        run: |
          echo "============================================"
          echo "Release URL:"
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag_name }}"
          echo "============================================"
